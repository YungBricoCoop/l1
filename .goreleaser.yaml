version: 2

builds:
  - env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    binary: l1

archives:
  - formats: [tar.gz]
    name_template: 'l1_{{ trimprefix .Version "v" }}_{{ .Os }}_{{ .Arch }}'
    wrap_in_directory: false
  - id: windows
    ids: [default]
    formats: [zip]
    name_template: 'l1_{{ trimprefix .Version "v" }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: "checksums.txt"
